<!DOCTYPE html>
<html><head><title>Generate Icons</title></head>
<body style="font-family:sans-serif;padding:40px;text-align:center">
<h2>Right-click each icon and "Save image as..."</h2>
<p>Save as <b>icon-192.png</b> and <b>icon-512.png</b> on your Desktop</p>
<br>
<canvas id="c192" width="192" height="192"></canvas>
<canvas id="c512" width="512" height="512"></canvas>
<br><br>
<img id="img192"> <img id="img512">
<script>
function draw(canvas,size){
  const ctx=canvas.getContext('2d');
  // Green gradient background
  const g=ctx.createLinearGradient(0,0,size,size);
  g.addColorStop(0,'#58CC02');g.addColorStop(1,'#46a302');
  // Rounded rect
  const r=size*0.18;
  ctx.beginPath();
  ctx.moveTo(r,0);ctx.lineTo(size-r,0);ctx.quadraticCurveTo(size,0,size,r);
  ctx.lineTo(size,size-r);ctx.quadraticCurveTo(size,size,size-r,size);
  ctx.lineTo(r,size);ctx.quadraticCurveTo(0,size,0,size-r);
  ctx.lineTo(0,r);ctx.quadraticCurveTo(0,0,r,0);
  ctx.closePath();ctx.fillStyle=g;ctx.fill();
  // Text
  ctx.fillStyle='#fff';
  ctx.font=`bold ${size*0.35}px -apple-system,sans-serif`;
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('SR',size/2,size*0.42);
  // Subtitle
  ctx.font=`bold ${size*0.11}px -apple-system,sans-serif`;
  ctx.globalAlpha=0.85;
  ctx.fillText('LEARN',size/2,size*0.68);
  ctx.globalAlpha=1;
}
draw(document.getElementById('c192'),192);
draw(document.getElementById('c512'),512);
// Convert to images for easy saving
document.getElementById('img192').src=document.getElementById('c192').toDataURL('image/png');
document.getElementById('img512').src=document.getElementById('c512').toDataURL('image/png');
document.getElementById('c192').style.display='none';
document.getElementById('c512').style.display='none';
</script>
</body></html>
